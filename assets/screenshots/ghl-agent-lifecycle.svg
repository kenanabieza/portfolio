<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#f8fafc"/>
  <!-- Top bar -->
  <rect width="800" height="48" fill="#1e3a5f"/>
  <circle cx="16" cy="24" r="5" fill="#ff5f57"/>
  <circle cx="34" cy="24" r="5" fill="#febc2e"/>
  <circle cx="52" cy="24" r="5" fill="#28c840"/>
  <text x="80" y="28" font-family="Inter,sans-serif" font-size="13" font-weight="700" fill="#fff">GoHighLevel</text>
  <text x="400" y="28" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" fill="#8ab4e8">Agent Lifecycle Engine &middot; Pipelines &amp; Workflows</text>

  <!-- Sidebar -->
  <rect x="0" y="48" width="180" height="452" fill="#0f2744"/>
  <text x="20" y="80" font-family="Inter,sans-serif" font-size="10" font-weight="600" fill="#4a90d9" text-transform="uppercase">CRM</text>
  <rect x="12" y="92" width="156" height="30" rx="4" fill="#1a3a5f"/>
  <text x="24" y="111" font-family="Inter,sans-serif" font-size="9" fill="#ccc">Contacts (1,833)</text>
  <rect x="12" y="128" width="156" height="30" rx="4" fill="#264d7a"/>
  <text x="24" y="147" font-family="Inter,sans-serif" font-size="9" fill="#fff" font-weight="600">Pipelines</text>
  <rect x="12" y="164" width="156" height="30" rx="4" fill="#1a3a5f"/>
  <text x="24" y="183" font-family="Inter,sans-serif" font-size="9" fill="#ccc">Workflows</text>
  <rect x="12" y="200" width="156" height="30" rx="4" fill="#1a3a5f"/>
  <text x="24" y="219" font-family="Inter,sans-serif" font-size="9" fill="#ccc">Custom Fields (14)</text>
  <rect x="12" y="236" width="156" height="30" rx="4" fill="#1a3a5f"/>
  <text x="24" y="255" font-family="Inter,sans-serif" font-size="9" fill="#ccc">Reputation</text>

  <!-- Pipelines header -->
  <text x="200" y="78" font-family="Inter,sans-serif" font-size="13" font-weight="700" fill="#1e293b">Two Segmented Pipelines</text>

  <!-- Pipeline 1: RE Agent -->
  <rect x="200" y="92" width="280" height="148" rx="8" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="200" y="92" width="280" height="28" rx="8" fill="#3b82f6"/>
  <rect x="200" y="112" width="280" height="8" fill="#3b82f6"/>
  <text x="216" y="111" font-family="Inter,sans-serif" font-size="11" font-weight="700" fill="#fff">Real Estate Agent Lifecycle</text>

  <!-- Stages -->
  <rect x="212" y="132" width="62" height="22" rx="3" fill="#dbeafe"/>
  <text x="243" y="146" text-anchor="middle" font-family="Inter,sans-serif" font-size="8" font-weight="600" fill="#1e40af">New Lead</text>
  <rect x="280" y="132" width="62" height="22" rx="3" fill="#fed7aa"/>
  <text x="311" y="146" text-anchor="middle" font-family="Inter,sans-serif" font-size="8" font-weight="600" fill="#9a3412">Contacted</text>
  <rect x="348" y="132" width="62" height="22" rx="3" fill="#e9d5ff"/>
  <text x="379" y="146" text-anchor="middle" font-family="Inter,sans-serif" font-size="8" font-weight="600" fill="#6b21a8">Booked</text>
  <rect x="416" y="132" width="56" height="22" rx="3" fill="#d1fae5"/>
  <text x="444" y="146" text-anchor="middle" font-family="Inter,sans-serif" font-size="8" font-weight="600" fill="#065f46">Delivered</text>
  <rect x="212" y="160" width="80" height="22" rx="3" fill="#cffafe"/>
  <text x="252" y="174" text-anchor="middle" font-family="Inter,sans-serif" font-size="8" font-weight="600" fill="#155e75">Repeat Client</text>
  <rect x="298" y="160" width="62" height="22" rx="3" fill="#fef3c7"/>
  <text x="329" y="174" text-anchor="middle" font-family="Inter,sans-serif" font-size="8" font-weight="600" fill="#854d0e">Lapsed</text>
  <rect x="366" y="160" width="40" height="22" rx="3" fill="#fee2e2"/>
  <text x="386" y="174" text-anchor="middle" font-family="Inter,sans-serif" font-size="8" font-weight="600" fill="#991b1b">Lost</text>

  <text x="216" y="200" font-family="Inter,sans-serif" font-size="9" fill="#64748b">Auto-stage transitions on Aryeo events:</text>
  <text x="216" y="214" font-family="Inter,sans-serif" font-size="8" fill="#10b981">&#10003; order.fulfilled &rarr; Booked</text>
  <text x="216" y="226" font-family="Inter,sans-serif" font-size="8" fill="#10b981">&#10003; media.delivered &rarr; Delivered</text>

  <!-- Pipeline 2: Builder -->
  <rect x="500" y="92" width="280" height="148" rx="8" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="500" y="92" width="280" height="28" rx="8" fill="#8b5cf6"/>
  <rect x="500" y="112" width="280" height="8" fill="#8b5cf6"/>
  <text x="516" y="111" font-family="Inter,sans-serif" font-size="11" font-weight="700" fill="#fff">Builder &amp; Property Manager</text>

  <rect x="512" y="132" width="68" height="22" rx="3" fill="#dbeafe"/>
  <text x="546" y="146" text-anchor="middle" font-family="Inter,sans-serif" font-size="8" font-weight="600" fill="#1e40af">Prospect</text>
  <rect x="586" y="132" width="68" height="22" rx="3" fill="#fed7aa"/>
  <text x="620" y="146" text-anchor="middle" font-family="Inter,sans-serif" font-size="8" font-weight="600" fill="#9a3412">Engaged</text>
  <rect x="660" y="132" width="62" height="22" rx="3" fill="#e9d5ff"/>
  <text x="691" y="146" text-anchor="middle" font-family="Inter,sans-serif" font-size="8" font-weight="600" fill="#6b21a8">In Project</text>
  <rect x="512" y="160" width="80" height="22" rx="3" fill="#d1fae5"/>
  <text x="552" y="174" text-anchor="middle" font-family="Inter,sans-serif" font-size="8" font-weight="600" fill="#065f46">Delivered</text>
  <rect x="598" y="160" width="100" height="22" rx="3" fill="#cffafe"/>
  <text x="648" y="174" text-anchor="middle" font-family="Inter,sans-serif" font-size="8" font-weight="600" fill="#155e75">Followup Sent (30d)</text>

  <text x="516" y="200" font-family="Inter,sans-serif" font-size="9" fill="#64748b">Custom segmentation tags:</text>
  <text x="516" y="214" font-family="Inter,sans-serif" font-size="8" fill="#3b82f6">&middot; Builder &middot; Property Manager &middot; Brokerage</text>

  <!-- Review Request Engine -->
  <rect x="200" y="252" width="580" height="120" rx="8" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="216" y="276" font-family="Inter,sans-serif" font-size="11" font-weight="700" fill="#1e293b">Review Request Engine &mdash; Intent Routing</text>
  <rect x="610" y="262" width="156" height="20" rx="10" fill="#dcfce7"/>
  <text x="688" y="276" text-anchor="middle" font-family="Inter,sans-serif" font-size="8" font-weight="700" fill="#16a34a">LIVE IN PRODUCTION</text>

  <!-- Trigger box -->
  <rect x="216" y="294" width="120" height="60" rx="6" fill="#dbeafe" stroke="#bfdbfe"/>
  <text x="276" y="313" text-anchor="middle" font-family="Inter,sans-serif" font-size="9" font-weight="700" fill="#1e40af">Media Delivered</text>
  <text x="276" y="328" text-anchor="middle" font-family="Inter,sans-serif" font-size="8" fill="#3b82f6">+ 30-day cap clear</text>
  <text x="276" y="342" text-anchor="middle" font-family="Inter,sans-serif" font-size="8" fill="#64748b">SMS &amp; email sent</text>

  <!-- Arrow to intent -->
  <line x1="336" y1="324" x2="368" y2="324" stroke="#94a3b8" stroke-width="1.5"/>
  <polygon points="372,324 364,320 364,328" fill="#94a3b8"/>

  <!-- Intent detection box -->
  <rect x="372" y="294" width="120" height="60" rx="6" fill="#fef3c7" stroke="#fde68a"/>
  <text x="432" y="313" text-anchor="middle" font-family="Inter,sans-serif" font-size="9" font-weight="700" fill="#854d0e">Intent Detection</text>
  <text x="432" y="328" text-anchor="middle" font-family="Inter,sans-serif" font-size="8" fill="#a16207">Reply parsing</text>
  <text x="432" y="342" text-anchor="middle" font-family="Inter,sans-serif" font-size="8" fill="#64748b">3-way classifier</text>

  <!-- Branch arrows -->
  <line x1="492" y1="304" x2="528" y2="298" stroke="#10b981" stroke-width="1.5"/>
  <polygon points="532,298 524,295 525,302" fill="#10b981"/>
  <line x1="492" y1="324" x2="528" y2="324" stroke="#3b82f6" stroke-width="1.5"/>
  <polygon points="532,324 524,320 524,328" fill="#3b82f6"/>
  <line x1="492" y1="344" x2="528" y2="350" stroke="#dc2626" stroke-width="1.5"/>
  <polygon points="532,350 525,346 524,353" fill="#dc2626"/>

  <!-- Three branches -->
  <rect x="532" y="290" width="232" height="20" rx="4" fill="#dcfce7"/>
  <text x="544" y="304" font-family="Inter,sans-serif" font-size="9" font-weight="600" fill="#166534">Positive &rarr; Google review prompt + tag</text>
  <rect x="532" y="314" width="232" height="20" rx="4" fill="#dbeafe"/>
  <text x="544" y="328" font-family="Inter,sans-serif" font-size="9" font-weight="600" fill="#1e40af">No reply &rarr; 2-day follow-up sequence</text>
  <rect x="532" y="338" width="232" height="20" rx="4" fill="#fee2e2"/>
  <text x="544" y="352" font-family="Inter,sans-serif" font-size="9" font-weight="600" fill="#991b1b">Negative &rarr; Owner alert + private feedback flow</text>

  <!-- Bottom stats -->
  <rect x="200" y="385" width="580" height="100" rx="8" fill="#f0f9ff" stroke="#bae6fd" stroke-width="1"/>
  <text x="220" y="408" font-family="Inter,sans-serif" font-size="11" font-weight="700" fill="#0c4a6e">System scale &amp; engagement loops</text>

  <rect x="220" y="420" width="120" height="50" rx="6" fill="#fff"/>
  <text x="280" y="442" text-anchor="middle" font-family="Inter,sans-serif" font-size="16" font-weight="800" fill="#3b82f6">1,833</text>
  <text x="280" y="460" text-anchor="middle" font-family="Inter,sans-serif" font-size="8" fill="#64748b">contacts (Aryeo bulk import)</text>

  <rect x="350" y="420" width="120" height="50" rx="6" fill="#fff"/>
  <text x="410" y="442" text-anchor="middle" font-family="Inter,sans-serif" font-size="16" font-weight="800" fill="#10b981">14</text>
  <text x="410" y="460" text-anchor="middle" font-family="Inter,sans-serif" font-size="8" fill="#64748b">custom fields modeled</text>

  <rect x="480" y="420" width="120" height="50" rx="6" fill="#fff"/>
  <text x="540" y="442" text-anchor="middle" font-family="Inter,sans-serif" font-size="16" font-weight="800" fill="#a855f7">60d</text>
  <text x="540" y="460" text-anchor="middle" font-family="Inter,sans-serif" font-size="8" fill="#64748b">lapsed-agent re-engagement</text>

  <rect x="610" y="420" width="120" height="50" rx="6" fill="#fff"/>
  <text x="670" y="442" text-anchor="middle" font-family="Inter,sans-serif" font-size="16" font-weight="800" fill="#f97316">30d</text>
  <text x="670" y="460" text-anchor="middle" font-family="Inter,sans-serif" font-size="8" fill="#64748b">builder follow-up cadence</text>
</svg>
