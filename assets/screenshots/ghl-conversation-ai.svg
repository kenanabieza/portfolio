<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <!-- Background -->
  <rect width="800" height="500" fill="#f8fafc"/>
  <!-- Top bar -->
  <rect width="800" height="48" fill="#1e3a5f"/>
  <circle cx="16" cy="24" r="5" fill="#ff5f57"/>
  <circle cx="34" cy="24" r="5" fill="#febc2e"/>
  <circle cx="52" cy="24" r="5" fill="#28c840"/>
  <text x="80" y="28" font-family="Inter,sans-serif" font-size="13" font-weight="700" fill="#fff">GoHighLevel</text>
  <text x="400" y="28" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" fill="#8ab4e8">AI Agents &#183; Conversation AI</text>

  <!-- AI Agents top nav -->
  <rect x="0" y="48" width="800" height="42" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="20" y="74" font-family="Inter,sans-serif" font-size="11" font-weight="700" fill="#0f172a">AI Agents</text>
  <text x="120" y="74" font-family="Inter,sans-serif" font-size="10" fill="#64748b">Getting Started</text>
  <text x="218" y="74" font-family="Inter,sans-serif" font-size="10" fill="#64748b">Agent Studio</text>
  <text x="305" y="74" font-family="Inter,sans-serif" font-size="10" fill="#64748b">Voice AI</text>
  <text x="368" y="74" font-family="Inter,sans-serif" font-size="10" font-weight="700" fill="#3b82f6">Conversation AI</text>
  <line x1="358" y1="86" x2="478" y2="86" stroke="#3b82f6" stroke-width="2"/>
  <text x="488" y="74" font-family="Inter,sans-serif" font-size="10" fill="#64748b">Knowledge Base</text>
  <text x="595" y="74" font-family="Inter,sans-serif" font-size="10" fill="#64748b">Agent Templates</text>
  <text x="702" y="74" font-family="Inter,sans-serif" font-size="10" fill="#64748b">Content AI</text>
  <text x="772" y="74" font-family="Inter,sans-serif" font-size="10" fill="#64748b">Logs</text>

  <!-- Page title -->
  <text x="40" y="120" font-family="Inter,sans-serif" font-size="20" font-weight="800" fill="#0f172a">Real Estate SMS Assistant</text>
  <text x="40" y="139" font-family="Inter,sans-serif" font-size="11" fill="#64748b">Unlock the power of automated conversations</text>

  <!-- Sub-tabs -->
  <text x="40" y="172" font-family="Inter,sans-serif" font-size="11" font-weight="700" fill="#3b82f6">Bot Settings</text>
  <line x1="40" y1="182" x2="105" y2="182" stroke="#3b82f6" stroke-width="2"/>
  <text x="125" y="172" font-family="Inter,sans-serif" font-size="11" fill="#64748b">Bot Training</text>
  <text x="208" y="172" font-family="Inter,sans-serif" font-size="11" fill="#64748b">Bot Goals</text>
  <text x="278" y="172" font-family="Inter,sans-serif" font-size="11" fill="#64748b">Dashboard</text>
  <line x1="0" y1="190" x2="800" y2="190" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Bot Details Card -->
  <rect x="40" y="208" width="720" height="232" rx="12" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Bot Details header -->
  <text x="60" y="232" font-family="Inter,sans-serif" font-size="13" font-weight="700" fill="#0f172a">Bot Details</text>
  <rect x="142" y="220" width="48" height="16" rx="8" fill="#dbeafe"/>
  <text x="166" y="232" text-anchor="middle" font-family="Inter,sans-serif" font-size="9" font-weight="700" fill="#1e40af">Primary</text>
  <text x="60" y="250" font-family="Inter,sans-serif" font-size="10" fill="#64748b">Configure your bot's communication preferences and settings</text>

  <!-- Set as Primary Bot button (greyed) -->
  <rect x="630" y="218" width="116" height="22" rx="6" fill="#f1f5f9" stroke="#e2e8f0"/>
  <text x="688" y="232" text-anchor="middle" font-family="Inter,sans-serif" font-size="9" fill="#94a3b8">Set as Primary Bot</text>

  <line x1="60" y1="262" x2="740" y2="262" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Bot Name field -->
  <text x="60" y="280" font-family="Inter,sans-serif" font-size="10" font-weight="600" fill="#0f172a">Bot Name <tspan fill="#dc2626">*</tspan></text>
  <rect x="60" y="288" width="680" height="26" rx="6" fill="#fff" stroke="#cbd5e1"/>
  <text x="72" y="305" font-family="Inter,sans-serif" font-size="11" fill="#0f172a">Real Estate SMS Assistant</text>

  <!-- Set Bot Status -->
  <text x="60" y="335" font-family="Inter,sans-serif" font-size="10" font-weight="600" fill="#0f172a">Set Bot Status</text>
  <text x="60" y="349" font-family="Inter,sans-serif" font-size="9" fill="#64748b">Choose the bot's operating mode (choose one)</text>

  <!-- Off card -->
  <rect x="60" y="358" width="220" height="56" rx="8" fill="#fff" stroke="#e2e8f0"/>
  <rect x="72" y="370" width="22" height="22" rx="4" fill="#f1f5f9"/>
  <line x1="78" y1="375" x2="88" y2="385" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="88" y1="375" x2="78" y2="385" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="104" y="380" font-family="Inter,sans-serif" font-size="11" font-weight="700" fill="#0f172a">Off</text>
  <text x="104" y="395" font-family="Inter,sans-serif" font-size="9" fill="#64748b">Turn off Conversations AI</text>
  <circle cx="263" cy="386" r="6" fill="#fff" stroke="#cbd5e1"/>

  <!-- Suggestive card (selected) -->
  <rect x="290" y="358" width="220" height="56" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <rect x="302" y="370" width="22" height="22" rx="4" fill="#dbeafe"/>
  <rect x="306" y="375" width="14" height="10" rx="1.5" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="334" y="380" font-family="Inter,sans-serif" font-size="11" font-weight="700" fill="#3b82f6">Suggestive</text>
  <text x="334" y="395" font-family="Inter,sans-serif" font-size="9" fill="#3b82f6">Suggests prompts within chat window</text>
  <circle cx="493" cy="386" r="6" fill="#3b82f6"/>
  <circle cx="493" cy="386" r="2.5" fill="#fff"/>

  <!-- Auto Pilot card -->
  <rect x="520" y="358" width="220" height="56" rx="8" fill="#fff" stroke="#e2e8f0"/>
  <rect x="532" y="370" width="22" height="22" rx="4" fill="#f1f5f9"/>
  <polygon points="540,378 548,381 540,384 540,378" fill="#94a3b8"/>
  <text x="564" y="380" font-family="Inter,sans-serif" font-size="11" font-weight="700" fill="#0f172a">Auto Pilot</text>
  <text x="564" y="395" font-family="Inter,sans-serif" font-size="9" fill="#64748b">Bot replies automatically</text>
  <circle cx="723" cy="386" r="6" fill="#fff" stroke="#cbd5e1"/>

  <!-- AI bot trial banner -->
  <rect x="60" y="425" width="680" height="0" fill="none"/>

  <!-- Channels footnote -->
  <rect x="40" y="455" width="720" height="32" rx="8" fill="#f0f9ff" stroke="#bae6fd"/>
  <text x="56" y="476" font-family="Inter,sans-serif" font-size="10" font-weight="700" fill="#0c4a6e">Active channel:</text>
  <rect x="142" y="465" width="50" height="18" rx="4" fill="#fff" stroke="#bae6fd"/>
  <text x="167" y="477" text-anchor="middle" font-family="Inter,sans-serif" font-size="9" font-weight="600" fill="#0c4a6e">SMS &#215;</text>
  <text x="208" y="476" font-family="Inter,sans-serif" font-size="10" fill="#0c4a6e">Knowledge base trained &#183; 39 FAQs &#183; Workflow integration ready</text>
</svg>
