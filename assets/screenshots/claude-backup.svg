    <text x="100" y="9" font-family="Inter,sans-serif" font-size="11" font-weight="600" fill="#fff">Vercel Photos &#8594; R2</text>
    <text x="100" y="22" font-family="JetBrains Mono,monospace" font-size="9" fill="#6B7280">backup_photos.sh &#183; 43,919 product images &#183; incremental</text>
    <text x="340" y="9" font-family="JetBrains Mono,monospace" font-size="10" fill="#7DD3FC">0 4 * * *</text>
    <text x="460" y="9" font-family="Inter,sans-serif" font-size="10" fill="#CBD5E1">2h 23m ago</text>
    <text x="580" y="9" font-family="Inter,sans-serif" font-size="10" fill="#CBD5E1">18m 06s</text>
    <text x="680" y="9" font-family="Inter,sans-serif" font-size="10" fill="#CBD5E1">25.5 GB</text>
