    <text x="460" y="9" font-family="Inter,sans-serif" font-size="10" fill="#CBD5E1">23m ago</text>
    <text x="580" y="9" font-family="Inter,sans-serif" font-size="10" fill="#CBD5E1">12s</text>
    <text x="680" y="9" font-family="Inter,sans-serif" font-size="10" fill="#CBD5E1">82 MB</text>
