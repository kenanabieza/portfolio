    <text x="580" y="9" font-family="Inter,sans-serif" font-size="10" fill="#CBD5E1">2m 14s</text>
    <text x="680" y="9" font-family="Inter,sans-serif" font-size="10" fill="#CBD5E1">1.4 GB</text>
