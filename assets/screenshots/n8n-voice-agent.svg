    <text x="40" y="100" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" font-weight="600" fill="#0F1126">VAPI Trigger</text>
    <text x="40" y="115" text-anchor="middle" font-family="Inter,sans-serif" font-size="9" fill="#8B8E99">incoming call</text>
