  <g transform="translate(446, 180)">
    <rect x="0" y="0" width="80" height="80" rx="8" fill="#FFFFFF" stroke="#DBDFE7" filter="url(#n8nShadow3)"/>
    <text x="40" y="35" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="14" font-weight="900" fill="#F59E0B">IF</text>
