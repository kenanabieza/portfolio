  <!-- Branch true: Book + SMS confirm -->
  <path d="M 526 200 C 560 200 570 140 596 140" stroke="#10B981" stroke-width="2" fill="none"/>
  <text x="554" y="158" font-family="Inter,sans-serif" font-size="9" font-weight="700" fill="#10B981">true</text>

