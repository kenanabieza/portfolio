    <line x1="18" y1="14" x2="18" y2="10" stroke="#1A73E8" stroke-width="1.5"/>
    <line x1="30" y1="14" x2="30" y2="10" stroke="#1A73E8" stroke-width="1.5"/>
    <text x="24" y="60" text-anchor="middle" font-family="Inter,sans-serif" font-size="7" fill="#525567">G Calendar</text>
  </g>
  <line x1="358" y1="260" x2="358" y2="294" stroke="#B4B7C1" stroke-width="1.5" stroke-dasharray="3,3"/>
  <g transform="translate(334, 294)">
    <rect x="0" y="0" width="48" height="48" rx="6" fill="#FFFFFF" stroke="#DBDFE7" filter="url(#n8nShadow3)"/>
    <circle cx="24" cy="24" r="9" fill="#FFD43B"/>
    <text x="24" y="28" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" font-weight="900" fill="#000">N</text>
    <text x="24" y="60" text-anchor="middle" font-family="Inter,sans-serif" font-size="7" fill="#525567">CRM tool</text>
  </g>

  <!-- Connection: Booking Agent → IF -->
  <path d="M 366 220 C 410 220 420 220 446 220" stroke="#B4B7C1" stroke-width="2" fill="none"/>

