  <text x="368" y="471" text-anchor="middle" font-family="Inter,sans-serif" font-size="9" font-weight="700" fill="#fff">&#9654; Execute</text>
  <line x1="418" y1="460" x2="418" y2="476" stroke="#E4E6EB"/>
  <text x="436" y="471" font-family="Inter,sans-serif" font-size="10" fill="#525567">142 runs today</text>
