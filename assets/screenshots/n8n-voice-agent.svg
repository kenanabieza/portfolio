  <text x="88" y="402" font-family="Inter,sans-serif" font-size="10" font-weight="700" fill="#92400E">Performance</text>
  <text x="88" y="418" font-family="Inter,sans-serif" font-size="8" fill="#525567">90-100% reduction in scheduling</text>
  <text x="88" y="430" font-family="Inter,sans-serif" font-size="8" fill="#525567">28% revenue increase, 24/7 booking</text>
  <text x="88" y="442" font-family="Inter,sans-serif" font-size="8" fill="#525567">Avg 47s call duration</text>

  <!-- Bottom toolbar -->
