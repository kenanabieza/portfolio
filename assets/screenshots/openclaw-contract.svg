  <text x="92" y="22" font-family="Inter,sans-serif" font-size="9" fill="#5F6368">app.openclaw.ai &#183; Contract Review</text>

  <!-- Top bar -->
  <rect x="0" y="36" width="800" height="52" fill="#FFFFFF"/>
  <line x1="0" y1="88" x2="800" y2="88" stroke="#E2E8F0"/>
  <!-- Logo -->
  <rect x="20" y="52" width="22" height="22" rx="5" fill="#10B981"/>
  <path d="M28 64 a3 3 0 0 1 6 0 v3 h-6 z" fill="#fff"/>
  <text x="50" y="68" font-family="Inter,sans-serif" font-size="13" font-weight="700" fill="#0F172A">OpenClaw</text>
  <!-- Search -->
  <rect x="160" y="52" width="280" height="24" rx="6" fill="#F1F5F9"/>
  <text x="172" y="68" font-family="Inter,sans-serif" font-size="9" fill="#94A3B8">&#128270;  Search clauses, contracts, parties...</text>
  <!-- Right cluster -->
  <rect x="600" y="50" width="80" height="28" rx="6" fill="#10B981"/>
  <text x="640" y="68" text-anchor="middle" font-family="Inter,sans-serif" font-size="10" font-weight="600" fill="#fff">+ Upload</text>
  <circle cx="708" cy="64" r="14" fill="#10B981" opacity="0.15"/>
  <text x="708" y="69" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" font-weight="700" fill="#10B981">K</text>

  <!-- Sidebar -->
  <rect x="0" y="88" width="180" height="412" fill="#F8FAFC"/>
  <text x="20" y="112" font-family="Inter,sans-serif" font-size="10" font-weight="700" fill="#475569">DOCUMENTS</text>
  <rect x="12" y="120" width="156" height="36" rx="6" fill="#10B981" opacity="0.12"/>
  <rect x="12" y="120" width="3" height="36" fill="#10B981"/>
  <text x="22" y="135" font-family="Inter,sans-serif" font-size="10" font-weight="700" fill="#0F172A">SaaS Agreement v3</text>
  <text x="22" y="148" font-family="Inter,sans-serif" font-size="8" fill="#64748B">Reviewed 2h ago</text>
  <rect x="12" y="162" width="156" height="36" rx="6" fill="transparent"/>
  <text x="22" y="177" font-family="Inter,sans-serif" font-size="10" fill="#0F172A">NDA - Acme Corp</text>
  <text x="22" y="190" font-family="Inter,sans-serif" font-size="8" fill="#64748B">2 risks flagged</text>
  <rect x="12" y="204" width="156" height="36" rx="6" fill="transparent"/>
  <text x="22" y="219" font-family="Inter,sans-serif" font-size="10" fill="#0F172A">Service Contract</text>
  <text x="22" y="232" font-family="Inter,sans-serif" font-size="8" fill="#64748B">In review</text>
  <rect x="12" y="246" width="156" height="36" rx="6" fill="transparent"/>
  <text x="22" y="261" font-family="Inter,sans-serif" font-size="10" fill="#0F172A">Employment Agmt</text>
  <text x="22" y="274" font-family="Inter,sans-serif" font-size="8" fill="#64748B">Approved</text>

  <text x="20" y="316" font-family="Inter,sans-serif" font-size="10" font-weight="700" fill="#475569">STATS</text>
  <text x="20" y="338" font-family="Inter,sans-serif" font-size="11" font-weight="800" fill="#10B981">12</text>
  <text x="38" y="338" font-family="Inter,sans-serif" font-size="9" fill="#475569">contracts reviewed</text>
  <text x="20" y="358" font-family="Inter,sans-serif" font-size="11" font-weight="800" fill="#EF4444">3</text>
  <text x="38" y="358" font-family="Inter,sans-serif" font-size="9" fill="#475569">risks flagged today</text>
  <text x="20" y="378" font-family="Inter,sans-serif" font-size="11" font-weight="800" fill="#0F172A">95%</text>
  <text x="50" y="378" font-family="Inter,sans-serif" font-size="9" fill="#475569">clause accuracy</text>

  <!-- ============ MAIN: split view ============ -->
  <!-- Doc viewer (left half) -->
  <rect x="180" y="88" width="380" height="412" fill="#FFFFFF"/>
  <text x="200" y="112" font-family="Inter,sans-serif" font-size="14" font-weight="700" fill="#0F172A">SaaS Master Service Agreement v3</text>
  <text x="200" y="128" font-family="Inter,sans-serif" font-size="9" fill="#64748B">Uploaded 2h ago &#183; AI Analysis Complete &#183; 47 pages</text>

  <!-- Document content -->
  <rect x="200" y="148" width="340" height="334" rx="6" fill="#F8FAFC" stroke="#E2E8F0"/>
  <text x="216" y="172" font-family="Inter,sans-serif" font-size="11" font-weight="700" fill="#0F172A">3. LIMITATION OF LIABILITY</text>

  <text x="216" y="194" font-family="Inter,sans-serif" font-size="9" fill="#0F172A">3.1 Subject to Section 3.2, in no event shall either party</text>
  <text x="216" y="208" font-family="Inter,sans-serif" font-size="9" fill="#0F172A">be liable for any indirect, incidental, special,</text>
  <text x="216" y="222" font-family="Inter,sans-serif" font-size="9" fill="#0F172A">consequential or punitive damages...</text>

  <!-- Highlighted clause (risk) -->
  <rect x="212" y="240" width="316" height="56" rx="4" fill="#FEF3C7"/>
  <rect x="212" y="240" width="3" height="56" fill="#F59E0B"/>
  <text x="222" y="258" font-family="Inter,sans-serif" font-size="9" fill="#0F172A" font-weight="600">3.2 Notwithstanding Section 3.1, the limitations shall</text>
  <text x="222" y="272" font-family="Inter,sans-serif" font-size="9" fill="#0F172A" font-weight="600">not apply to liability arising from gross negligence,</text>
  <text x="222" y="286" font-family="Inter,sans-serif" font-size="9" fill="#0F172A" font-weight="600">willful misconduct, or breach of confidentiality...</text>

  <text x="216" y="316" font-family="Inter,sans-serif" font-size="11" font-weight="700" fill="#0F172A">4. INDEMNIFICATION</text>
  <text x="216" y="338" font-family="Inter,sans-serif" font-size="9" fill="#0F172A">4.1 Each party shall indemnify, defend and hold</text>
  <text x="216" y="352" font-family="Inter,sans-serif" font-size="9" fill="#0F172A">harmless the other party from any third-party claims...</text>

  <!-- High risk highlight -->
  <rect x="212" y="370" width="316" height="42" rx="4" fill="#FEE2E2"/>
  <rect x="212" y="370" width="3" height="42" fill="#EF4444"/>
  <text x="222" y="388" font-family="Inter,sans-serif" font-size="9" fill="#0F172A" font-weight="600">4.2 The indemnification obligations under this Section</text>
  <text x="222" y="402" font-family="Inter,sans-serif" font-size="9" fill="#0F172A" font-weight="600">shall survive termination of this Agreement indefinitely.</text>

  <!-- Page indicator -->
  <text x="216" y="436" font-family="Inter,sans-serif" font-size="8" fill="#94A3B8">Page 12 of 47</text>
  <rect x="280" y="424" width="240" height="4" rx="2" fill="#E2E8F0"/>
  <rect x="280" y="424" width="60" height="4" rx="2" fill="#10B981"/>

