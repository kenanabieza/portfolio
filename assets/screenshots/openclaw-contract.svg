  <text x="592" y="142" font-family="Inter,sans-serif" font-size="9" fill="#64748B">RISK SCORE</text>
  <text x="592" y="172" font-family="Inter,sans-serif" font-size="22" font-weight="800" fill="#F59E0B">Medium</text>
  <text x="660" y="172" font-family="Inter,sans-serif" font-size="9" fill="#64748B">7 findings</text>

  <!-- Findings list -->
  <text x="580" y="208" font-family="Inter,sans-serif" font-size="10" font-weight="700" fill="#475569">FLAGGED CLAUSES</text>

  <rect x="580" y="218" width="200" height="50" rx="6" fill="#FFFFFF" stroke="#FEE2E2"/>
  <rect x="580" y="218" width="3" height="50" fill="#EF4444"/>
  <text x="592" y="236" font-family="Inter,sans-serif" font-size="9" font-weight="700" fill="#0F172A">Indemnification</text>
  <rect x="678" y="226" width="60" height="14" rx="3" fill="#FEE2E2"/>
  <text x="708" y="237" text-anchor="middle" font-family="Inter,sans-serif" font-size="8" font-weight="700" fill="#DC2626">HIGH RISK</text>
  <text x="592" y="252" font-family="Inter,sans-serif" font-size="8" fill="#64748B">Survives indefinitely &#183; no cap</text>

  <rect x="580" y="278" width="200" height="50" rx="6" fill="#FFFFFF" stroke="#FEF3C7"/>
  <rect x="580" y="278" width="3" height="50" fill="#F59E0B"/>
  <text x="592" y="296" font-family="Inter,sans-serif" font-size="9" font-weight="700" fill="#0F172A">Liability cap exclusions</text>
  <rect x="688" y="286" width="50" height="14" rx="3" fill="#FEF3C7"/>
  <text x="713" y="297" text-anchor="middle" font-family="Inter,sans-serif" font-size="8" font-weight="700" fill="#D97706">MEDIUM</text>
  <text x="592" y="312" font-family="Inter,sans-serif" font-size="8" fill="#64748B">Multiple carve-outs in 3.2</text>

  <rect x="580" y="338" width="200" height="50" rx="6" fill="#FFFFFF" stroke="#FEF3C7"/>
  <rect x="580" y="338" width="3" height="50" fill="#F59E0B"/>
  <text x="592" y="356" font-family="Inter,sans-serif" font-size="9" font-weight="700" fill="#0F172A">Auto-renewal terms</text>
  <rect x="688" y="346" width="50" height="14" rx="3" fill="#FEF3C7"/>
  <text x="713" y="357" text-anchor="middle" font-family="Inter,sans-serif" font-size="8" font-weight="700" fill="#D97706">MEDIUM</text>
  <text x="592" y="372" font-family="Inter,sans-serif" font-size="8" fill="#64748B">90-day cancellation only</text>

  <!-- Generate summary CTA -->
  <rect x="580" y="406" width="200" height="32" rx="6" fill="#10B981"/>
  <text x="680" y="426" text-anchor="middle" font-family="Inter,sans-serif" font-size="10" font-weight="600" fill="#fff">&#10026; Generate Executive Summary</text>

  <text x="580" y="460" font-family="Inter,sans-serif" font-size="8" fill="#64748B">Analysis: gpt-4 + RAG over 14k contracts</text>
  <text x="580" y="474" font-family="Inter,sans-serif" font-size="8" fill="#10B981">80% faster reviews &#183; 95% clause detection</text>
</svg>
