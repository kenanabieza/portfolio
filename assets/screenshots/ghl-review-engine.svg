<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <!-- Background -->
  <rect width="800" height="500" fill="#f8fafc"/>
  <!-- Top bar -->
  <rect width="800" height="48" fill="#1e3a5f"/>
  <circle cx="16" cy="24" r="5" fill="#ff5f57"/>
  <circle cx="34" cy="24" r="5" fill="#febc2e"/>
  <circle cx="52" cy="24" r="5" fill="#28c840"/>
  <text x="80" y="28" font-family="Inter,sans-serif" font-size="13" font-weight="700" fill="#fff">GoHighLevel</text>
  <text x="400" y="28" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" fill="#8ab4e8">Workflow &#183; Review Request Engine</text>

  <!-- Title -->
  <text x="40" y="72" font-family="Inter,sans-serif" font-size="13" font-weight="700" fill="#0f172a">Review Request Engine</text>
  <rect x="180" y="60" width="62" height="16" rx="8" fill="#dcfce7"/>
  <text x="211" y="72" text-anchor="middle" font-family="Inter,sans-serif" font-size="9" font-weight="700" fill="#16a34a">LIVE</text>
  <text x="40" y="88" font-family="Inter,sans-serif" font-size="10" fill="#64748b">Sentiment-based intent routing for post-delivery review requests</text>

  <!-- ========== Stage 1: Linear chain ========== -->
  <!-- Webhook -->
  <rect x="20" y="108" width="116" height="48" rx="8" fill="#fff" stroke="#e2e8f0"/>
  <rect x="26" y="115" width="18" height="18" rx="4" fill="#dcfce7"/>
  <path d="M30 124 a3 3 0 0 1 6 0" stroke="#16a34a" stroke-width="1.5" fill="none"/>
  <path d="M32 121 a5 5 0 0 1 2 0" stroke="#16a34a" stroke-width="1.5" fill="none"/>
  <circle cx="33" cy="128" r="0.8" fill="#16a34a"/>
  <text x="50" y="125" font-family="Inter,sans-serif" font-size="9" font-weight="700" fill="#16a34a">Webhook</text>
  <text x="26" y="148" font-family="Inter,sans-serif" font-size="8" fill="#64748b">Delivery Webhook</text>

  <line x1="136" y1="132" x2="156" y2="132" stroke="#cbd5e1" stroke-width="1"/>
  <polygon points="160,132 152,128 152,136" fill="#cbd5e1"/>

  <!-- Upsert -->
  <rect x="156" y="116" width="124" height="32" rx="8" fill="#fff" stroke="#e2e8f0"/>
  <rect x="162" y="120" width="18" height="18" rx="4" fill="#dbeafe"/>
  <circle cx="168" cy="127" r="2" fill="#3b82f6"/>
  <path d="M164 134 a4 4 0 0 1 8 0" stroke="#3b82f6" stroke-width="1.5" fill="none"/>
  <text x="186" y="132" font-family="Inter,sans-serif" font-size="9" font-weight="600" fill="#0f172a">Upsert Delivered Client</text>

  <line x1="280" y1="132" x2="300" y2="132" stroke="#cbd5e1" stroke-width="1"/>
  <polygon points="304,132 296,128 296,136" fill="#cbd5e1"/>

  <!-- Wait -->
  <rect x="300" y="116" width="80" height="32" rx="8" fill="#fff" stroke="#e2e8f0"/>
  <rect x="306" y="120" width="18" height="18" rx="4" fill="#ede9fe"/>
  <circle cx="315" cy="129" r="5" fill="none" stroke="#a855f7" stroke-width="1.5"/>
  <line x1="315" y1="129" x2="315" y2="126" stroke="#a855f7" stroke-width="1.5"/>
  <line x1="315" y1="129" x2="317" y2="131" stroke="#a855f7" stroke-width="1.5"/>
  <text x="330" y="132" font-family="Inter,sans-serif" font-size="9" font-weight="600" fill="#0f172a">Wait</text>

  <line x1="380" y1="132" x2="400" y2="132" stroke="#cbd5e1" stroke-width="1"/>
  <polygon points="404,132 396,128 396,136" fill="#cbd5e1"/>

  <!-- Review Request SMS -->
  <rect x="400" y="116" width="124" height="32" rx="8" fill="#fff" stroke="#e2e8f0"/>
  <rect x="406" y="120" width="18" height="18" rx="4" fill="#dcfce7"/>
  <rect x="409" y="124" width="12" height="9" rx="2" fill="none" stroke="#16a34a" stroke-width="1.5"/>
  <text x="430" y="132" font-family="Inter,sans-serif" font-size="9" font-weight="600" fill="#0f172a">Review Request SMS</text>

  <line x1="524" y1="132" x2="544" y2="132" stroke="#cbd5e1" stroke-width="1"/>
  <polygon points="548,132 540,128 540,136" fill="#cbd5e1"/>

  <!-- Wait for Reply -->
  <rect x="544" y="116" width="116" height="32" rx="8" fill="#fff" stroke="#7c3aed"/>
  <rect x="550" y="120" width="18" height="18" rx="4" fill="#ede9fe"/>
  <circle cx="559" cy="129" r="5" fill="none" stroke="#a855f7" stroke-width="1.5"/>
  <line x1="559" y1="129" x2="559" y2="126" stroke="#a855f7" stroke-width="1.5"/>
  <line x1="559" y1="129" x2="561" y2="131" stroke="#a855f7" stroke-width="1.5"/>
  <text x="572" y="132" font-family="Inter,sans-serif" font-size="9" font-weight="600" fill="#0f172a">Wait for Review Reply</text>

  <!-- ========== Stage 2: Two branches under Wait for Reply ========== -->
  <!-- Vertical line down from Wait for Reply -->
  <line x1="602" y1="148" x2="602" y2="170" stroke="#cbd5e1" stroke-width="1"/>
  <!-- Horizontal branch -->
  <line x1="430" y1="170" x2="700" y2="170" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="430" y1="170" x2="430" y2="184" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="700" y1="170" x2="700" y2="184" stroke="#cbd5e1" stroke-width="1"/>

  <!-- Contact Reply branch chip -->
  <rect x="370" y="184" width="120" height="26" rx="6" fill="#fff" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="430" y="201" text-anchor="middle" font-family="Inter,sans-serif" font-size="10" font-weight="700" fill="#7c3aed">&#8617; Contact Reply</text>

  <!-- Time Out branch chip -->
  <rect x="640" y="184" width="120" height="26" rx="6" fill="#fff" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="700" y="201" text-anchor="middle" font-family="Inter,sans-serif" font-size="10" font-weight="700" fill="#7c3aed">&#9202; Time Out (48h)</text>

  <!-- Time Out goes to END -->
  <line x1="700" y1="210" x2="700" y2="234" stroke="#cbd5e1" stroke-width="1"/>
  <rect x="680" y="234" width="40" height="20" rx="10" fill="#e2e8f0"/>
  <text x="700" y="247" text-anchor="middle" font-family="Inter,sans-serif" font-size="9" font-weight="700" fill="#64748b">END</text>

  <!-- ========== Stage 3: Analyze Sentiment under Contact Reply ========== -->
  <line x1="430" y1="210" x2="430" y2="232" stroke="#cbd5e1" stroke-width="1"/>

  <!-- Analyze Review Sentiment node -->
  <rect x="356" y="232" width="148" height="36" rx="8" fill="#fff" stroke="#7c3aed" stroke-width="1.5"/>
  <rect x="364" y="240" width="20" height="20" rx="4" fill="#ede9fe"/>
  <!-- AI sparkle -->
  <circle cx="370" cy="246" r="1.5" fill="#7c3aed"/>
  <circle cx="378" cy="252" r="1.5" fill="#7c3aed"/>
  <circle cx="372" cy="256" r="1" fill="#7c3aed"/>
  <text x="392" y="248" font-family="Inter,sans-serif" font-size="10" font-weight="700" fill="#7c3aed">Analyze Review Sentiment</text>
  <text x="392" y="262" font-family="Inter,sans-serif" font-size="8" fill="#64748b">AI intent classifier</text>

  <!-- ========== Stage 4: Three-way branch ========== -->
  <line x1="430" y1="268" x2="430" y2="288" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="200" y1="288" x2="660" y2="288" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="200" y1="288" x2="200" y2="302" stroke="#10b981" stroke-width="1.5"/>
  <line x1="430" y1="288" x2="430" y2="302" stroke="#dc2626" stroke-width="1.5"/>
  <line x1="660" y1="288" x2="660" y2="302" stroke="#94a3b8" stroke-width="1.5"/>

  <!-- Positive chip -->
  <rect x="150" y="302" width="100" height="22" rx="11" fill="#dcfce7"/>
  <text x="200" y="316" text-anchor="middle" font-family="Inter,sans-serif" font-size="10" font-weight="700" fill="#16a34a">Positive</text>

  <!-- Negative chip -->
  <rect x="380" y="302" width="100" height="22" rx="11" fill="#fee2e2"/>
  <text x="430" y="316" text-anchor="middle" font-family="Inter,sans-serif" font-size="10" font-weight="700" fill="#dc2626">Negative</text>

  <!-- None chip -->
  <rect x="610" y="302" width="100" height="22" rx="11" fill="#e2e8f0"/>
  <text x="660" y="316" text-anchor="middle" font-family="Inter,sans-serif" font-size="10" font-weight="700" fill="#475569">None</text>

  <!-- ========== Stage 5: Actions per branch ========== -->
  <line x1="200" y1="324" x2="200" y2="346" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="430" y1="324" x2="430" y2="346" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="660" y1="324" x2="660" y2="346" stroke="#cbd5e1" stroke-width="1"/>

  <!-- Positive: Send Review Link -->
  <rect x="130" y="346" width="140" height="34" rx="8" fill="#fff" stroke="#bbf7d0"/>
  <rect x="138" y="354" width="18" height="18" rx="4" fill="#dcfce7"/>
  <rect x="141" y="358" width="12" height="9" rx="2" fill="none" stroke="#16a34a" stroke-width="1.5"/>
  <text x="200" y="367" text-anchor="middle" font-family="Inter,sans-serif" font-size="9" font-weight="600" fill="#0f172a">Send Review Link</text>
  <text x="200" y="376" text-anchor="middle" font-family="Inter,sans-serif" font-size="8" fill="#16a34a">Google review prompt</text>

  <!-- Negative: Add Tag -->
  <rect x="360" y="346" width="140" height="34" rx="8" fill="#fff" stroke="#fecaca"/>
  <rect x="368" y="354" width="18" height="18" rx="4" fill="#fee2e2"/>
  <polygon points="372,360 382,360 384,364 382,368 372,368 370,364" fill="none" stroke="#dc2626" stroke-width="1.5"/>
  <text x="430" y="367" text-anchor="middle" font-family="Inter,sans-serif" font-size="9" font-weight="600" fill="#0f172a">Add Tag</text>
  <text x="430" y="376" text-anchor="middle" font-family="Inter,sans-serif" font-size="8" fill="#dc2626">negative-feedback</text>

  <!-- None: END -->
  <rect x="640" y="346" width="40" height="20" rx="10" fill="#e2e8f0"/>
  <text x="660" y="359" text-anchor="middle" font-family="Inter,sans-serif" font-size="9" font-weight="700" fill="#64748b">END</text>

  <!-- ========== Stage 6: Negative continues to alert ========== -->
  <line x1="200" y1="380" x2="200" y2="408" stroke="#cbd5e1" stroke-width="1"/>
  <rect x="180" y="408" width="40" height="20" rx="10" fill="#e2e8f0"/>
  <text x="200" y="421" text-anchor="middle" font-family="Inter,sans-serif" font-size="9" font-weight="700" fill="#64748b">END</text>

  <line x1="430" y1="380" x2="430" y2="402" stroke="#cbd5e1" stroke-width="1"/>
  <rect x="360" y="402" width="140" height="34" rx="8" fill="#fff" stroke="#fde68a"/>
  <rect x="368" y="410" width="18" height="18" rx="4" fill="#fef3c7"/>
  <!-- Bell icon -->
  <path d="M375 414 a4 4 0 0 1 8 0 v6 h-8 z" fill="none" stroke="#d97706" stroke-width="1.5"/>
  <line x1="377" y1="424" x2="381" y2="424" stroke="#d97706" stroke-width="1.5"/>
  <text x="430" y="423" text-anchor="middle" font-family="Inter,sans-serif" font-size="9" font-weight="600" fill="#0f172a">Negative Feedback Alert</text>
  <text x="430" y="432" text-anchor="middle" font-family="Inter,sans-serif" font-size="8" fill="#d97706">Owner notified</text>

  <line x1="430" y1="436" x2="430" y2="460" stroke="#cbd5e1" stroke-width="1"/>
  <rect x="410" y="460" width="40" height="20" rx="10" fill="#e2e8f0"/>
  <text x="430" y="473" text-anchor="middle" font-family="Inter,sans-serif" font-size="9" font-weight="700" fill="#64748b">END</text>
</svg>
