<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500" font-family="Inter, Arial, sans-serif">
  <rect width="800" height="500" fill="#1A1D23"/>

  <!-- Header -->
  <rect x="0" y="0" width="800" height="56" fill="#21252B"/>
  <rect x="0" y="55" width="800" height="1" fill="#2D3139"/>
  <rect x="20" y="16" width="30" height="24" rx="6" fill="#6366f1"/>
  <text x="35" y="32" fill="#ffffff" font-size="10" font-weight="700" text-anchor="middle">MCP</text>
  <text x="62" y="33" fill="#E6E8EB" font-size="15" font-weight="700">MCP Server Console</text>
  <text x="214" y="33" fill="#94A3B8" font-size="12">crm-ops-mcp &#183; JSON-RPC 2.0 &#183; HTTP/SSE</text>
  <rect x="694" y="18" width="82" height="22" rx="11" fill="rgba(16,185,129,0.15)"/>
  <circle cx="710" cy="29" r="4" fill="#34d399"/>
  <text x="720" y="33" fill="#34d399" font-size="12" font-weight="600">Live</text>

  <!-- Stat strip -->
  <g>
    <rect x="24" y="76" width="176" height="50" rx="10" fill="#21252B" stroke="#2D3139"/>
    <text x="40" y="99" fill="#E6E8EB" font-size="18" font-weight="700">12</text>
    <text x="40" y="116" fill="#94A3B8" font-size="11">Tools exposed</text>

    <rect x="216" y="76" width="176" height="50" rx="10" fill="#21252B" stroke="#2D3139"/>
    <text x="232" y="99" fill="#E6E8EB" font-size="18" font-weight="700">4</text>
    <text x="232" y="116" fill="#94A3B8" font-size="11">Clients connected</text>

    <rect x="408" y="76" width="176" height="50" rx="10" fill="#21252B" stroke="#2D3139"/>
    <text x="424" y="99" fill="#E6E8EB" font-size="18" font-weight="700">OAuth</text>
    <text x="424" y="116" fill="#94A3B8" font-size="11">Per-tool scoped</text>

    <rect x="600" y="76" width="176" height="50" rx="10" fill="#21252B" stroke="#2D3139"/>
    <text x="616" y="99" fill="#E6E8EB" font-size="18" font-weight="700">100%</text>
    <text x="616" y="116" fill="#94A3B8" font-size="11">Calls audited</text>
  </g>

