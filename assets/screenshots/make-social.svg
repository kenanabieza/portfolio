<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <pattern id="makeDots2" width="16" height="16" patternUnits="userSpaceOnUse">
      <circle cx="8" cy="8" r="0.6" fill="#E0E0E5"/>
    </pattern>
    <filter id="makeShadow2" x="-20%" y="-20%" width="140%" height="140%">
