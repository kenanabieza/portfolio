  <polygon points="688,237 694,240 688,243" fill="#B0B0BA"/>
  <g transform="translate(705, 210)">
    <circle cx="30" cy="30" r="30" fill="#FFFFFF" stroke="#1877F2" stroke-width="2" filter="url(#makeShadow2)"/>
    <rect x="18" y="18" width="24" height="24" rx="3" fill="#1877F2"/>
    <text x="30" y="36" text-anchor="middle" font-family="Inter,sans-serif" font-size="13" font-weight="900" fill="#fff">f</text>
    <circle cx="6" cy="6" r="9" fill="#6D00CC"/>
    <text x="6" y="9" text-anchor="middle" font-family="Inter,sans-serif" font-size="9" font-weight="800" fill="#fff">7</text>
