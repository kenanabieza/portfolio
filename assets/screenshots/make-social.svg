  <!-- Module 1: Notion (trigger) -->
  <g transform="translate(96, 180)">
    <circle cx="40" cy="40" r="40" fill="#FFFFFF" stroke="#000000" stroke-width="2.5" filter="url(#makeShadow2)"/>
    <rect x="22" y="22" width="36" height="36" rx="2" fill="#000"/>
    <text x="40" y="46" text-anchor="middle" font-family="Inter,sans-serif" font-size="13" font-weight="900" fill="#fff">N</text>
    <circle cx="6" cy="6" r="11" fill="#6D00CC"/>
    <text x="6" y="10" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" font-weight="800" fill="#fff">1</text>
    <circle cx="68" cy="68" r="7" fill="#10B981" stroke="#fff" stroke-width="2"/>
    <text x="40" y="100" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" font-weight="600" fill="#0F1126">Notion</text>
    <text x="40" y="114" text-anchor="middle" font-family="Inter,sans-serif" font-size="9" fill="#737373">Watch DB items</text>
  </g>

  <!-- Connection 1->2 -->
  <path d="M 176 220 C 200 220 220 220 246 220" stroke="#B0B0BA" stroke-width="2" fill="none"/>
  <polygon points="222,217 228,220 222,223" fill="#B0B0BA"/>

  <!-- Module 2: OpenAI (Generate) -->
  <g transform="translate(246, 180)">
    <circle cx="40" cy="40" r="40" fill="#FFFFFF" stroke="#10A37F" stroke-width="2.5" filter="url(#makeShadow2)"/>
    <polygon points="40,22 52,30 52,42 40,50 28,42 28,30" fill="#10A37F"/>
    <text x="40" y="44" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" font-weight="900" fill="#fff">AI</text>
    <circle cx="6" cy="6" r="11" fill="#6D00CC"/>
    <text x="6" y="10" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" font-weight="800" fill="#fff">2</text>
    <circle cx="68" cy="68" r="7" fill="#10B981" stroke="#fff" stroke-width="2"/>
    <text x="40" y="100" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" font-weight="600" fill="#0F1126">OpenAI</text>
    <text x="40" y="114" text-anchor="middle" font-family="Inter,sans-serif" font-size="9" fill="#737373">Generate captions</text>
  </g>

  <!-- Connection 2->3 -->
  <path d="M 326 220 C 350 220 370 220 396 220" stroke="#B0B0BA" stroke-width="2" fill="none"/>
  <polygon points="372,217 378,220 372,223" fill="#B0B0BA"/>

  <!-- Module 3: Iterator -->
  <g transform="translate(396, 180)">
    <circle cx="40" cy="40" r="40" fill="#FFFFFF" stroke="#14B8A6" stroke-width="2.5" filter="url(#makeShadow2)"/>
    <!-- Iterator stack icon -->
    <rect x="26" y="26" width="28" height="6" rx="2" fill="#14B8A6"/>
    <rect x="26" y="36" width="28" height="6" rx="2" fill="#14B8A6"/>
