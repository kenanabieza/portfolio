    <circle cx="40" cy="40" r="32" fill="none" stroke="#B794F4" stroke-width="2"/>
    <line x1="32" y1="40" x2="48" y2="32" stroke="#6D00CC" stroke-width="2"/>
    <line x1="32" y1="40" x2="48" y2="40" stroke="#6D00CC" stroke-width="2"/>
    <line x1="32" y1="40" x2="48" y2="48" stroke="#6D00CC" stroke-width="2"/>
