    <circle cx="6" cy="6" r="9" fill="#6D00CC"/>
    <text x="6" y="9" text-anchor="middle" font-family="Inter,sans-serif" font-size="9" font-weight="800" fill="#fff">8</text>
  </g>

  <!-- TikTok -->
  <path d="M 626 245 C 670 245 685 370 705 370" stroke="#B0B0BA" stroke-width="2" fill="none"/>
  <polygon points="688,367 694,370 688,373" fill="#B0B0BA"/>
  <g transform="translate(705, 340)">
    <circle cx="30" cy="30" r="30" fill="#FFFFFF" stroke="#000000" stroke-width="2" filter="url(#makeShadow2)"/>
    <rect x="18" y="18" width="24" height="24" rx="4" fill="#000"/>
    <text x="30" y="36" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" font-weight="900" fill="#FE2C55">T</text>
    <circle cx="6" cy="6" r="9" fill="#6D00CC"/>
    <text x="6" y="9" text-anchor="middle" font-family="Inter,sans-serif" font-size="9" font-weight="800" fill="#fff">9</text>
  </g>

  <!-- Sticky note -->
  <rect x="80" y="380" width="200" height="76" rx="6" fill="#FFF8C5" stroke="#E5DC8A"/>
  <text x="92" y="402" font-family="Inter,sans-serif" font-size="10" font-weight="700" fill="#92400E">Performance</text>
  <text x="92" y="418" font-family="Inter,sans-serif" font-size="8" fill="#525567">15 hrs/wk saved</text>
  <text x="92" y="430" font-family="Inter,sans-serif" font-size="8" fill="#525567">3x posting frequency</text>
  <text x="92" y="442" font-family="Inter,sans-serif" font-size="8" fill="#525567">5 platforms from one calendar</text>

  <!-- Bottom toolbar -->
  <rect x="296" y="450" width="320" height="36" rx="18" fill="#FFFFFF" stroke="#E5E5EA" filter="url(#makeShadow2)"/>
  <rect x="306" y="458" width="76" height="20" rx="10" fill="#6D00CC"/>
  <text x="344" y="471" text-anchor="middle" font-family="Inter,sans-serif" font-size="9" font-weight="700" fill="#fff">&#9654; Run once</text>
  <line x1="394" y1="460" x2="394" y2="476" stroke="#E5E5EA"/>
  <text x="412" y="471" font-family="Inter,sans-serif" font-size="9" fill="#525567">Schedule</text>
  <line x1="462" y1="460" x2="462" y2="476" stroke="#E5E5EA"/>
  <text x="480" y="471" font-family="Inter,sans-serif" font-size="9" fill="#525567">Auto-align</text>
  <line x1="534" y1="460" x2="534" y2="476" stroke="#E5E5EA"/>
  <text x="552" y="471" font-family="Inter,sans-serif" font-size="9" fill="#525567">Notes</text>
  <line x1="584" y1="460" x2="584" y2="476" stroke="#E5E5EA"/>
  <text x="600" y="471" font-family="Inter,sans-serif" font-size="9" fill="#525567">+</text>
</svg>
