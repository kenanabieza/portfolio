  <g transform="translate(705, 275)">
    <circle cx="30" cy="30" r="30" fill="#FFFFFF" stroke="#E1306C" stroke-width="2" filter="url(#makeShadow2)"/>
    <rect x="18" y="18" width="24" height="24" rx="6" fill="#E1306C"/>
    <circle cx="30" cy="30" r="6" fill="none" stroke="#fff" stroke-width="1.5"/>
