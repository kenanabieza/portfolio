  <polygon points="688,107 694,110 688,113" fill="#B0B0BA"/>
  <g transform="translate(705, 80)">
    <circle cx="30" cy="30" r="30" fill="#FFFFFF" stroke="#0A66C2" stroke-width="2" filter="url(#makeShadow2)"/>
    <rect x="18" y="18" width="24" height="24" rx="3" fill="#0A66C2"/>
    <text x="30" y="36" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" font-weight="900" fill="#fff">in</text>
    <circle cx="6" cy="6" r="9" fill="#6D00CC"/>
