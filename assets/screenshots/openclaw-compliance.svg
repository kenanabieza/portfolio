<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <filter id="ocShadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.06"/>
    </filter>
    <linearGradient id="complianceGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#10B981;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#10B981;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Browser chrome -->
  <rect width="800" height="36" fill="#E8E8E8"/>
  <circle cx="16" cy="18" r="5" fill="#FF5F57"/>
  <circle cx="34" cy="18" r="5" fill="#FEBC2E"/>
  <circle cx="52" cy="18" r="5" fill="#28C840"/>
  <rect x="80" y="8" width="500" height="20" rx="4" fill="#FFFFFF"/>
  <text x="92" y="22" font-family="Inter,sans-serif" font-size="9" fill="#5F6368">app.openclaw.ai &#183; Regulatory Compliance Monitor</text>

  <!-- Top bar -->
  <rect x="0" y="36" width="800" height="52" fill="#FFFFFF"/>
  <line x1="0" y1="88" x2="800" y2="88" stroke="#E2E8F0"/>
  <rect x="20" y="52" width="22" height="22" rx="5" fill="#10B981"/>
  <path d="M28 64 a3 3 0 0 1 6 0 v3 h-6 z" fill="#fff"/>
  <text x="50" y="68" font-family="Inter,sans-serif" font-size="13" font-weight="700" fill="#0F172A">OpenClaw</text>

  <!-- Tabs -->
  <text x="170" y="68" font-family="Inter,sans-serif" font-size="10" fill="#64748B">Documents</text>
  <text x="240" y="68" font-family="Inter,sans-serif" font-size="10" font-weight="700" fill="#10B981">Compliance</text>
  <line x1="238" y1="78" x2="306" y2="78" stroke="#10B981" stroke-width="2"/>
  <text x="316" y="68" font-family="Inter,sans-serif" font-size="10" fill="#64748B">Audit Reports</text>
  <text x="400" y="68" font-family="Inter,sans-serif" font-size="10" fill="#64748B">Settings</text>

  <!-- Right cluster -->
  <rect x="600" y="50" width="100" height="28" rx="6" fill="#10B981"/>
  <text x="650" y="68" text-anchor="middle" font-family="Inter,sans-serif" font-size="10" font-weight="600" fill="#fff">Generate Audit</text>
  <circle cx="724" cy="64" r="14" fill="#10B981" opacity="0.15"/>
  <text x="724" y="69" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" font-weight="700" fill="#10B981">K</text>

  <!-- Page heading -->
  <text x="20" y="116" font-family="Inter,sans-serif" font-size="18" font-weight="700" fill="#0F172A">Compliance Dashboard</text>
  <text x="20" y="134" font-family="Inter,sans-serif" font-size="10" fill="#64748B">Monitoring 54 regulations &#183; Last scan: 15 min ago &#183; Next scheduled scan: in 4h</text>

  <!-- Stat row -->
  <g transform="translate(20, 156)">
    <rect x="0" y="0" width="180" height="80" rx="8" fill="#FFFFFF" stroke="#E2E8F0" filter="url(#ocShadow2)"/>
    <text x="16" y="22" font-family="Inter,sans-serif" font-size="9" fill="#64748B">REGULATIONS TRACKED</text>
    <text x="16" y="50" font-family="Inter,sans-serif" font-size="24" font-weight="800" fill="#0F172A">54</text>
    <text x="16" y="70" font-family="Inter,sans-serif" font-size="9" fill="#10B981">+3 added this quarter</text>
  </g>
  <g transform="translate(216, 156)">
    <rect x="0" y="0" width="180" height="80" rx="8" fill="#FFFFFF" stroke="#E2E8F0" filter="url(#ocShadow2)"/>
    <text x="16" y="22" font-family="Inter,sans-serif" font-size="9" fill="#64748B">COMPLIANCE SCORE</text>
    <text x="16" y="50" font-family="Inter,sans-serif" font-size="24" font-weight="800" fill="#10B981">96<tspan font-size="14" fill="#64748B">%</tspan></text>
    <text x="16" y="70" font-family="Inter,sans-serif" font-size="9" fill="#10B981">&#9650; 4% vs last month</text>
  </g>
  <g transform="translate(412, 156)">
    <rect x="0" y="0" width="180" height="80" rx="8" fill="#FFFFFF" stroke="#E2E8F0" filter="url(#ocShadow2)"/>
    <text x="16" y="22" font-family="Inter,sans-serif" font-size="9" fill="#64748B">OPEN GAPS</text>
    <text x="16" y="50" font-family="Inter,sans-serif" font-size="24" font-weight="800" fill="#F59E0B">7</text>
    <text x="16" y="70" font-family="Inter,sans-serif" font-size="9" fill="#EF4444">2 high priority</text>
  </g>
  <g transform="translate(608, 156)">
    <rect x="0" y="0" width="180" height="80" rx="8" fill="#FFFFFF" stroke="#E2E8F0" filter="url(#ocShadow2)"/>
    <text x="16" y="22" font-family="Inter,sans-serif" font-size="9" fill="#64748B">AUDIT READINESS</text>
    <text x="16" y="50" font-family="Inter,sans-serif" font-size="24" font-weight="800" fill="#10B981">100<tspan font-size="14" fill="#64748B">%</tspan></text>
    <text x="16" y="70" font-family="Inter,sans-serif" font-size="9" fill="#10B981">SOC 2 Type II ready</text>
  </g>

  <!-- Compliance trend chart -->
  <g transform="translate(20, 256)">
    <rect x="0" y="0" width="476" height="220" rx="8" fill="#FFFFFF" stroke="#E2E8F0" filter="url(#ocShadow2)"/>
    <text x="16" y="22" font-family="Inter,sans-serif" font-size="11" font-weight="700" fill="#0F172A">Compliance Score Trend (12 months)</text>
    <!-- Y axis -->
    <text x="34" y="50" font-family="Inter,sans-serif" font-size="8" fill="#94A3B8">100%</text>
    <text x="40" y="100" font-family="Inter,sans-serif" font-size="8" fill="#94A3B8">90%</text>
    <text x="40" y="150" font-family="Inter,sans-serif" font-size="8" fill="#94A3B8">80%</text>
    <!-- Grid -->
    <line x1="60" y1="48" x2="460" y2="48" stroke="#F1F5F9"/>
    <line x1="60" y1="98" x2="460" y2="98" stroke="#F1F5F9"/>
    <line x1="60" y1="148" x2="460" y2="148" stroke="#F1F5F9"/>
    <!-- Filled area -->
    <path d="M 60 130 L 100 110 L 140 115 L 180 95 L 220 90 L 260 85 L 300 70 L 340 65 L 380 60 L 420 55 L 460 50 L 460 184 L 60 184 Z" fill="url(#complianceGrad)"/>
    <!-- Line -->
    <polyline points="60,130 100,110 140,115 180,95 220,90 260,85 300,70 340,65 380,60 420,55 460,50" fill="none" stroke="#10B981" stroke-width="2"/>
    <circle cx="460" cy="50" r="4" fill="#10B981"/>
    <!-- X axis -->
    <text x="60" y="200" font-family="Inter,sans-serif" font-size="8" fill="#94A3B8">May 25</text>
    <text x="220" y="200" font-family="Inter,sans-serif" font-size="8" fill="#94A3B8">Nov 25</text>
    <text x="430" y="200" font-family="Inter,sans-serif" font-size="8" fill="#94A3B8">May 26</text>
  </g>

  <!-- Gap analysis -->
  <g transform="translate(512, 256)">
    <rect x="0" y="0" width="276" height="220" rx="8" fill="#FFFFFF" stroke="#E2E8F0" filter="url(#ocShadow2)"/>
    <text x="16" y="22" font-family="Inter,sans-serif" font-size="11" font-weight="700" fill="#0F172A">Recent gaps</text>

    <!-- Gap row 1 -->
    <rect x="14" y="40" width="248" height="42" rx="6" fill="#FEF2F2"/>
    <rect x="14" y="40" width="3" height="42" fill="#EF4444"/>
    <text x="26" y="58" font-family="Inter,sans-serif" font-size="10" font-weight="700" fill="#0F172A">GDPR Article 32</text>
    <rect x="170" y="48" width="50" height="14" rx="3" fill="#FEE2E2"/>
    <text x="195" y="59" text-anchor="middle" font-family="Inter,sans-serif" font-size="7" font-weight="700" fill="#DC2626">HIGH</text>
    <text x="26" y="74" font-family="Inter,sans-serif" font-size="8" fill="#64748B">Encryption at rest gap in EU region</text>

    <rect x="14" y="92" width="248" height="42" rx="6" fill="#FEF2F2"/>
    <rect x="14" y="92" width="3" height="42" fill="#EF4444"/>
    <text x="26" y="110" font-family="Inter,sans-serif" font-size="10" font-weight="700" fill="#0F172A">SOC 2 CC7.2</text>
    <rect x="170" y="100" width="50" height="14" rx="3" fill="#FEE2E2"/>
    <text x="195" y="111" text-anchor="middle" font-family="Inter,sans-serif" font-size="7" font-weight="700" fill="#DC2626">HIGH</text>
    <text x="26" y="126" font-family="Inter,sans-serif" font-size="8" fill="#64748B">Anomaly detection coverage at 76%</text>

    <rect x="14" y="144" width="248" height="42" rx="6" fill="#FFFBEB"/>
    <rect x="14" y="144" width="3" height="42" fill="#F59E0B"/>
    <text x="26" y="162" font-family="Inter,sans-serif" font-size="10" font-weight="700" fill="#0F172A">HIPAA Tech Safeguards</text>
    <rect x="170" y="152" width="60" height="14" rx="3" fill="#FEF3C7"/>
    <text x="200" y="163" text-anchor="middle" font-family="Inter,sans-serif" font-size="7" font-weight="700" fill="#D97706">MEDIUM</text>
    <text x="26" y="178" font-family="Inter,sans-serif" font-size="8" fill="#64748B">Audit log retention &lt; 6 years</text>

    <text x="16" y="206" font-family="Inter,sans-serif" font-size="9" fill="#10B981">View all 7 gaps &#8594;</text>
  </g>
</svg>
