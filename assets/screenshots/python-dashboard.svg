<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <filter id="stShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.05"/>
    </filter>
    <linearGradient id="chartGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF4B4B;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#FF4B4B;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Browser chrome -->
  <rect width="800" height="36" fill="#E8E8E8"/>
  <circle cx="16" cy="18" r="5" fill="#FF5F57"/>
  <circle cx="34" cy="18" r="5" fill="#FEBC2E"/>
  <circle cx="52" cy="18" r="5" fill="#28C840"/>
  <rect x="80" y="8" width="500" height="20" rx="4" fill="#FFFFFF"/>
  <text x="92" y="22" font-family="Inter,sans-serif" font-size="9" fill="#5F6368">localhost:8501 &#183; Business Intelligence Dashboard</text>

  <!-- Streamlit page -->
  <rect x="0" y="36" width="800" height="464" fill="#FFFFFF"/>

  <!-- Streamlit sidebar -->
  <rect x="0" y="36" width="200" height="464" fill="#F0F2F6"/>
  <text x="20" y="68" font-family="Inter,sans-serif" font-size="13" font-weight="700" fill="#262730">Filters</text>

  <!-- Date range -->
  <text x="20" y="92" font-family="Inter,sans-serif" font-size="10" fill="#262730">Date range</text>
  <rect x="20" y="98" width="160" height="32" rx="6" fill="#FFFFFF" stroke="#D6D8DD"/>
  <text x="32" y="118" font-family="Inter,sans-serif" font-size="10" fill="#262730">Last 30 days</text>
  <text x="170" y="118" font-family="Inter,sans-serif" font-size="9" fill="#808495">&#9662;</text>

  <!-- Multiselect: regions -->
  <text x="20" y="150" font-family="Inter,sans-serif" font-size="10" fill="#262730">Regions</text>
  <rect x="20" y="156" width="160" height="32" rx="6" fill="#FFFFFF" stroke="#D6D8DD"/>
  <rect x="28" y="164" width="40" height="16" rx="3" fill="#FF4B4B"/>
  <text x="48" y="175" text-anchor="middle" font-family="Inter,sans-serif" font-size="8" font-weight="600" fill="#fff">NA &#215;</text>
  <rect x="72" y="164" width="46" height="16" rx="3" fill="#FF4B4B"/>
  <text x="95" y="175" text-anchor="middle" font-family="Inter,sans-serif" font-size="8" font-weight="600" fill="#fff">EMEA &#215;</text>
  <rect x="122" y="164" width="40" height="16" rx="3" fill="#FF4B4B"/>
  <text x="142" y="175" text-anchor="middle" font-family="Inter,sans-serif" font-size="8" font-weight="600" fill="#fff">APAC &#215;</text>

  <!-- Slider: revenue threshold -->
  <text x="20" y="208" font-family="Inter,sans-serif" font-size="10" fill="#262730">Revenue threshold ($)</text>
  <line x1="20" y1="226" x2="180" y2="226" stroke="#D6D8DD" stroke-width="3"/>
  <line x1="20" y1="226" x2="120" y2="226" stroke="#FF4B4B" stroke-width="3"/>
  <circle cx="120" cy="226" r="6" fill="#FF4B4B"/>
  <text x="20" y="244" font-family="Inter,sans-serif" font-size="9" fill="#808495">$0</text>
  <text x="160" y="244" font-family="Inter,sans-serif" font-size="9" fill="#808495">$50K</text>
  <text x="120" y="218" text-anchor="middle" font-family="Inter,sans-serif" font-size="9" font-weight="700" fill="#FF4B4B">$32K</text>

  <!-- Data sources status -->
  <text x="20" y="288" font-family="Inter,sans-serif" font-size="11" font-weight="700" fill="#262730">Data sources</text>
  <circle cx="26" cy="306" r="3" fill="#10B981"/>
  <text x="34" y="310" font-family="Inter,sans-serif" font-size="9" fill="#262730">Google Sheets</text>
  <circle cx="26" cy="324" r="3" fill="#10B981"/>
  <text x="34" y="328" font-family="Inter,sans-serif" font-size="9" fill="#262730">Airtable</text>
  <circle cx="26" cy="342" r="3" fill="#10B981"/>
  <text x="34" y="346" font-family="Inter,sans-serif" font-size="9" fill="#262730">PostgreSQL</text>
  <circle cx="26" cy="360" r="3" fill="#FBBF24"/>
  <text x="34" y="364" font-family="Inter,sans-serif" font-size="9" fill="#262730">Stripe API (rate-limited)</text>

  <!-- Refresh button -->
  <rect x="20" y="404" width="160" height="32" rx="6" fill="#FF4B4B"/>
  <text x="100" y="424" text-anchor="middle" font-family="Inter,sans-serif" font-size="10" font-weight="700" fill="#fff">&#10227; Refresh data</text>

  <!-- Streamlit branding footer -->
  <text x="20" y="476" font-family="Inter,sans-serif" font-size="8" fill="#808495">Made with Streamlit</text>

  <!-- ============ MAIN CONTENT ============ -->
  <!-- Top right: rerun + stop -->
  <rect x="720" y="46" width="32" height="22" rx="4" fill="#FFFFFF" stroke="#D6D8DD"/>
  <text x="736" y="60" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" fill="#FF4B4B">&#10227;</text>
  <rect x="758" y="46" width="30" height="22" rx="4" fill="#FFFFFF" stroke="#D6D8DD"/>
  <text x="773" y="60" text-anchor="middle" font-family="Inter,sans-serif" font-size="9" fill="#262730">&#9881;</text>

  <!-- Page title -->
  <text x="220" y="76" font-family="Source Sans Pro,Inter,sans-serif" font-size="22" font-weight="700" fill="#262730">Business Intelligence</text>
  <text x="220" y="96" font-family="Inter,sans-serif" font-size="10" fill="#808495">Last updated: 2 minutes ago &#183; 5 data sources</text>

  <!-- KPI metric cards (st.metric style) -->
  <g transform="translate(220, 116)">
    <rect x="0" y="0" width="130" height="74" rx="6" fill="#FFFFFF" stroke="#E6EAF1" filter="url(#stShadow)"/>
    <text x="14" y="22" font-family="Inter,sans-serif" font-size="9" fill="#808495">REVENUE</text>
    <text x="14" y="50" font-family="Inter,sans-serif" font-size="22" font-weight="700" fill="#262730">$847K</text>
    <text x="14" y="66" font-family="Inter,sans-serif" font-size="9" fill="#10B981">&#9650; 12.4%</text>
  </g>
  <g transform="translate(360, 116)">
    <rect x="0" y="0" width="130" height="74" rx="6" fill="#FFFFFF" stroke="#E6EAF1" filter="url(#stShadow)"/>
    <text x="14" y="22" font-family="Inter,sans-serif" font-size="9" fill="#808495">CUSTOMERS</text>
    <text x="14" y="50" font-family="Inter,sans-serif" font-size="22" font-weight="700" fill="#262730">3,247</text>
    <text x="14" y="66" font-family="Inter,sans-serif" font-size="9" fill="#10B981">&#9650; 8.2%</text>
  </g>
  <g transform="translate(500, 116)">
    <rect x="0" y="0" width="130" height="74" rx="6" fill="#FFFFFF" stroke="#E6EAF1" filter="url(#stShadow)"/>
    <text x="14" y="22" font-family="Inter,sans-serif" font-size="9" fill="#808495">AOV</text>
    <text x="14" y="50" font-family="Inter,sans-serif" font-size="22" font-weight="700" fill="#262730">$261</text>
    <text x="14" y="66" font-family="Inter,sans-serif" font-size="9" fill="#EF4444">&#9660; 2.1%</text>
  </g>
  <g transform="translate(640, 116)">
    <rect x="0" y="0" width="130" height="74" rx="6" fill="#FFFFFF" stroke="#E6EAF1" filter="url(#stShadow)"/>
    <text x="14" y="22" font-family="Inter,sans-serif" font-size="9" fill="#808495">CHURN</text>
    <text x="14" y="50" font-family="Inter,sans-serif" font-size="22" font-weight="700" fill="#262730">2.8%</text>
    <text x="14" y="66" font-family="Inter,sans-serif" font-size="9" fill="#10B981">&#9660; 0.4%</text>
  </g>

  <!-- Line chart -->
  <g transform="translate(220, 210)">
    <rect x="0" y="0" width="380" height="200" rx="6" fill="#FFFFFF" stroke="#E6EAF1" filter="url(#stShadow)"/>
    <text x="16" y="22" font-family="Inter,sans-serif" font-size="11" font-weight="700" fill="#262730">Revenue (last 30 days)</text>
    <!-- Y axis labels -->
    <text x="40" y="56" font-family="Inter,sans-serif" font-size="8" fill="#808495">$50K</text>
    <text x="40" y="100" font-family="Inter,sans-serif" font-size="8" fill="#808495">$30K</text>
    <text x="40" y="144" font-family="Inter,sans-serif" font-size="8" fill="#808495">$10K</text>
    <!-- Grid lines -->
    <line x1="60" y1="56" x2="368" y2="56" stroke="#E6EAF1"/>
    <line x1="60" y1="100" x2="368" y2="100" stroke="#E6EAF1"/>
    <line x1="60" y1="144" x2="368" y2="144" stroke="#E6EAF1"/>
    <!-- Filled area -->
    <path d="M 60 130 L 100 110 L 140 118 L 180 90 L 220 95 L 260 75 L 300 80 L 340 60 L 368 55 L 368 168 L 60 168 Z" fill="url(#chartGrad)"/>
    <!-- Line -->
    <polyline points="60,130 100,110 140,118 180,90 220,95 260,75 300,80 340,60 368,55" fill="none" stroke="#FF4B4B" stroke-width="2"/>
    <!-- Data points -->
    <circle cx="368" cy="55" r="4" fill="#FF4B4B"/>
    <!-- X axis labels -->
    <text x="60" y="184" font-family="Inter,sans-serif" font-size="8" fill="#808495">Apr 1</text>
    <text x="220" y="184" font-family="Inter,sans-serif" font-size="8" fill="#808495">Apr 15</text>
    <text x="350" y="184" font-family="Inter,sans-serif" font-size="8" fill="#808495">Today</text>
  </g>

  <!-- Bar chart -->
  <g transform="translate(610, 210)">
    <rect x="0" y="0" width="180" height="200" rx="6" fill="#FFFFFF" stroke="#E6EAF1" filter="url(#stShadow)"/>
    <text x="16" y="22" font-family="Inter,sans-serif" font-size="11" font-weight="700" fill="#262730">Top channels</text>
    <!-- Bars -->
    <rect x="20" y="44" width="120" height="14" rx="2" fill="#FF4B4B"/>
    <text x="146" y="55" font-family="Inter,sans-serif" font-size="9" fill="#262730">42%</text>
    <text x="20" y="74" font-family="Inter,sans-serif" font-size="9" fill="#262730">Direct</text>
    <rect x="20" y="84" width="86" height="14" rx="2" fill="#FF4B4B" opacity="0.85"/>
    <text x="112" y="95" font-family="Inter,sans-serif" font-size="9" fill="#262730">28%</text>
    <text x="20" y="114" font-family="Inter,sans-serif" font-size="9" fill="#262730">Paid Search</text>
    <rect x="20" y="124" width="58" height="14" rx="2" fill="#FF4B4B" opacity="0.65"/>
    <text x="84" y="135" font-family="Inter,sans-serif" font-size="9" fill="#262730">19%</text>
    <text x="20" y="154" font-family="Inter,sans-serif" font-size="9" fill="#262730">Referral</text>
    <rect x="20" y="164" width="32" height="14" rx="2" fill="#FF4B4B" opacity="0.45"/>
    <text x="58" y="175" font-family="Inter,sans-serif" font-size="9" fill="#262730">11%</text>
  </g>

  <!-- Status banner -->
  <rect x="220" y="426" width="570" height="34" rx="6" fill="#F0FDF4" stroke="#BBF7D0"/>
  <text x="234" y="448" font-family="Inter,sans-serif" font-size="10" fill="#15803D">&#10003; All checks passing &#183; Auto PDF report queued for 5 PM &#183; Email distribution: 12 recipients</text>
</svg>
