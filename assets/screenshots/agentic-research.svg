    <ellipse cx="24" cy="22" rx="4" ry="9" fill="none" stroke="#3B82F6" stroke-width="1.2"/>
    <text x="24" y="60" text-anchor="middle" font-family="Inter,sans-serif" font-size="7" fill="#525567">web_search</text>
