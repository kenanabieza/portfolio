  <!-- Sticky note (research notes) -->
  <rect x="76" y="380" width="180" height="76" rx="6" fill="#FFF8C5" stroke="#E5DC8A"/>
  <text x="88" y="402" font-family="Inter,sans-serif" font-size="10" font-weight="700" fill="#92400E">Pipeline notes</text>
  <text x="88" y="418" font-family="Inter,sans-serif" font-size="8" fill="#525567">Average run: 8 min &#183; 23 sources</text>
  <text x="88" y="430" font-family="Inter,sans-serif" font-size="8" fill="#525567">Citations per report: 17</text>
  <text x="88" y="442" font-family="Inter,sans-serif" font-size="8" fill="#525567">Accuracy: 85%</text>

  <!-- Bottom toolbar -->
  <rect x="312" y="450" width="240" height="36" rx="18" fill="#FFFFFF" stroke="#DBDFE7" filter="url(#n8nShadow2)"/>
  <rect x="322" y="458" width="76" height="20" rx="10" fill="#EA4B71"/>
  <text x="360" y="471" text-anchor="middle" font-family="Inter,sans-serif" font-size="9" font-weight="700" fill="#fff">&#9654; Execute</text>
  <line x1="410" y1="460" x2="410" y2="476" stroke="#E4E6EB"/>
  <text x="428" y="471" font-family="Inter,sans-serif" font-size="10" fill="#525567">last run: 8m 14s</text>
</svg>
