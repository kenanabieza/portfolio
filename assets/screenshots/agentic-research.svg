  <line x1="358" y1="260" x2="358" y2="294" stroke="#B4B7C1" stroke-width="1.5" stroke-dasharray="3,3"/>
  <g transform="translate(334, 294)">
    <rect x="0" y="0" width="48" height="48" rx="6" fill="#FFFFFF" stroke="#DBDFE7" filter="url(#n8nShadow2)"/>
    <rect x="14" y="14" width="20" height="20" rx="3" fill="none" stroke="#525567" stroke-width="1.5"/>
    <line x1="18" y1="20" x2="30" y2="20" stroke="#525567" stroke-width="1.2"/>
    <line x1="18" y1="24" x2="26" y2="24" stroke="#525567" stroke-width="1.2"/>
    <line x1="18" y1="28" x2="28" y2="28" stroke="#525567" stroke-width="1.2"/>
    <text x="24" y="60" text-anchor="middle" font-family="Inter,sans-serif" font-size="7" fill="#525567">scraper</text>
  </g>

  <!-- Connection: Research Agent → Loop -->
  <path d="M 366 220 C 410 220 420 220 446 220" stroke="#B4B7C1" stroke-width="2" fill="none"/>

