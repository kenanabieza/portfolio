    <text x="40" y="115" text-anchor="middle" font-family="Inter,sans-serif" font-size="9" fill="#8B8E99">23 sources</text>
  </g>

  <!-- Connection: Loop → Pinecone -->
  <path d="M 526 220 C 560 220 570 140 596 140" stroke="#B4B7C1" stroke-width="2" fill="none"/>

  <!-- Pinecone Vector Store -->
  <g transform="translate(596, 100)">
    <rect x="0" y="0" width="80" height="80" rx="8" fill="#FFFFFF" stroke="#DBDFE7" filter="url(#n8nShadow2)"/>
    <ellipse cx="40" cy="32" rx="16" ry="4" fill="none" stroke="#0F172A" stroke-width="1.8"/>
    <ellipse cx="40" cy="40" rx="16" ry="4" fill="none" stroke="#0F172A" stroke-width="1.8"/>
    <ellipse cx="40" cy="48" rx="16" ry="4" fill="none" stroke="#0F172A" stroke-width="1.8"/>
    <text x="40" y="100" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" font-weight="600" fill="#0F1126">Pinecone</text>
    <text x="40" y="115" text-anchor="middle" font-family="Inter,sans-serif" font-size="9" fill="#8B8E99">Vector store</text>
