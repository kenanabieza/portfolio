  <g transform="translate(596, 340)">
    <rect x="0" y="0" width="110" height="80" rx="8" fill="#FFFFFF" stroke="#DBDFE7" filter="url(#n8nShadow2)"/>
    <rect x="84" y="6" width="20" height="14" rx="7" fill="#0F1126"/>
