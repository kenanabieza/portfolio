    <polygon points="55,30 65,36 65,46 55,52 45,46 45,36" fill="#D97757"/>
    <text x="55" y="44" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" font-weight="900" fill="#fff">&#10026;</text>
    <text x="55" y="100" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" font-weight="600" fill="#0F1126">Synthesizer</text>
    <text x="55" y="115" text-anchor="middle" font-family="Inter,sans-serif" font-size="9" fill="#8B8E99">claude-sonnet</text>
