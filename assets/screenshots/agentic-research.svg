  <rect x="20" y="18" width="24" height="24" rx="6" fill="#EA4B71"/>
  <text x="32" y="35" text-anchor="middle" font-family="Inter,sans-serif" font-size="13" font-weight="900" fill="#fff">n</text>
  <g stroke="#A0A4B8" stroke-width="1.5" fill="none">
    <rect x="22" y="64" width="20" height="20" rx="4"/>
    <rect x="22" y="96" width="20" height="20" rx="4"/>
    <rect x="22" y="128" width="20" height="20" rx="4"/>
    <rect x="22" y="160" width="20" height="20" rx="4"/>
