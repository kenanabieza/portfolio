  <g transform="translate(446, 180)">
    <rect x="0" y="0" width="80" height="80" rx="8" fill="#FFFFFF" stroke="#DBDFE7" filter="url(#n8nShadow2)"/>
    <circle cx="40" cy="40" r="14" fill="none" stroke="#3B82F6" stroke-width="2.5"/>
