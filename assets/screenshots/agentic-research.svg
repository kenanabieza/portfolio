    <path d="M30 40 a10 10 0 0 1 20 0" fill="none" stroke="#EA4B71" stroke-width="2"/>
    <circle cx="40" cy="40" r="3" fill="#EA4B71"/>
    <text x="40" y="100" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" font-weight="600" fill="#0F1126">Webhook</text>
    <text x="40" y="115" text-anchor="middle" font-family="Inter,sans-serif" font-size="9" fill="#8B8E99">/research-query</text>
  </g>
  <path d="M 176 140 C 210 140 220 220 256 220" stroke="#B4B7C1" stroke-width="2" fill="none"/>

